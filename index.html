<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TaskFlow | Elegant To-Do UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-app">
        <!-- header: stylish to-do section -->
        <div class="header">
            <div class="todo-title">📋 taskflow</div>
            
        </div>

        <!-- bottom input area -->
        <div class="bottom-bar">
            <div class="input-wrapper">
                <input type="text" class="bar" placeholder="write a new task... e.g., 'design system'">
                <button class="btn">+ Add task</button>
            </div>
        </div>

        <!-- container with task cards (static demo content, visually rich) -->
        <div class="container">
            
            

          
        </div>

        
        <div class="visual-footer">
            
            <button class="clear-link">🗑️ Clear all</button>
        </div>
    </div>
    <script src="javascript.js"></script>
</body>
</html>
